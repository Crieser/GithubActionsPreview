name: WPF Build Pipeline

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

jobs:

  build:

    runs-on: windows-latest

    steps:

      # Clone repository
      - name: Checkout
        uses: actions/checkout@v4

      # Install .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Cache NuGet packages
      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # Restore dependencies
      - name: Restore
        run: dotnet restore

      # Build project
      - name: Build
        run: |
          dotnet build \
          --configuration Release \
          --no-restore

      # Run tests (safe if none exist yet)
      - name: Test
        run: |
          dotnet test \
          --configuration Release \
          --no-build
        continue-on-error: true

      # Publish artifacts
      - name: Publish
        run: |
          dotnet publish \
          --configuration Release \
          --output publish

      # Upload executable output
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WPF-Build
          path: publish/
